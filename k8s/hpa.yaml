apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: devops-journey-hpa
  namespace: web-app-devops
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: devops-journey-deployment
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 50
