name: CI Syntax Check

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  validate-k8s:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Run Kube-Score
        run: |
          docker run --rm -v ${{ github.workspace }}/k8s:/project zegl/kube-score:latest score /project
