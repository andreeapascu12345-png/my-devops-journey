name: CI Syntax Check

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  validate-k8s:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate Kubernetes manifests (Dry Run)
        run: |
          docker run --rm -v $(pwd)/k8s:/project zegl/kube-score:latest sh -c "score /project/*.yaml"
