name: CI Syntax Check

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  validate-k8s:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Validate Kubernetes manifests (Dry Run)
        run: |
          docker run --rm -v $(pwd)/k8s:/apps alpine/k8s:1.29.2 kubectl apply --dry-run=client -f /apps/
